<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字フリップ · Kanji Flip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script src="kanji-data.js"></script>
<style>
:root {
  --card-front:   #f4ede0;
  --card-back:    #12203a;
  --kanji-ink:    #1c1410;
  --back-reading: #c9a86c;
  --back-meaning: #9fb8d8;
}

html, body { height: 100%; }

body {
  color: #ccc;
  padding: 2.5rem 1.5rem 3rem;
  user-select: none;
}

/* View containers — display:contents so children are direct flex items of body */
.view { display: contents; }

/* ── Header ─────────────────────────────────────── */
header { margin-bottom: 2.5rem; }
.title-ja { font-size: clamp(2rem, 6vw, 3rem); }

/* ── Group index tiles ───────────────────────────── */
.group-tiles {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 1rem;
  width: 100%;
  max-width: 540px;
}

.group-tile {
  background: rgba(201,168,108,0.03);
  border: 1px solid rgba(201,168,108,0.18);
  border-radius: 6px;
  padding: 1.5rem 1rem 1.25rem;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.85rem;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
}

.group-tile:hover {
  border-color: rgba(201,168,108,0.5);
  box-shadow: 0 4px 24px rgba(201,168,108,0.07), 0 2px 10px rgba(0,0,0,0.35);
  transform: translateY(-2px);
}

.tile-kanji {
  font-family: 'Noto Serif JP', serif;
  font-weight: 900;
  font-size: 1.9rem;
  color: var(--kanji-ink);
  background: var(--card-front);
  background-image: radial-gradient(ellipse at 30% 30%, rgba(255,255,240,0.5) 0%, transparent 60%);
  width: 62px;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 5px;
  border: 1px solid rgba(201,168,108,0.25);
  box-shadow: 0 2px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.6);
  flex-shrink: 0;
}

.tile-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.7rem;
  color: var(--gold-dim);
  letter-spacing: 0.08em;
  line-height: 1.5;
}

/* ── Group label ─────────────────────────────────── */
.group-label {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  color: var(--gold-dim);
  letter-spacing: 0.25em;
  margin-bottom: 1.5rem;
  min-height: 1.2em;
  text-align: center;
}

/* ── Card grid ───────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.85rem;
  width: 100%;
  max-width: 540px;
}

/* ── Card ────────────────────────────────────────── */
.card-wrap {
  perspective: 900px;
  cursor: pointer;
}

.card-inner {
  position: relative;
  width: 100%;
  padding-top: 130%;
  transform-style: preserve-3d;
  transition: transform 0.52s cubic-bezier(0.23, 1, 0.32, 1);
}

.card-wrap.flipped .card-inner { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 6px;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.3rem;
  padding: 0.75rem 0.5rem;
  transition: box-shadow 0.2s;
}

.card-front {
  background: var(--card-front);
  background-image: radial-gradient(ellipse at 30% 30%, rgba(255,255,240,0.5) 0%, transparent 60%);
  border: 1px solid rgba(201,168,108,0.25);
  box-shadow:
    0 2px 8px rgba(0,0,0,0.45),
    0 8px 24px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.6);
}

.card-wrap:hover .card-front {
  box-shadow:
    0 4px 16px rgba(201,168,108,0.15),
    0 12px 32px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.7);
}

.kanji-text {
  font-family: 'Noto Serif JP', serif;
  font-weight: 900;
  font-size: clamp(1.8rem, 5.5vw, 2.8rem);
  color: var(--kanji-ink);
  line-height: 1;
  text-shadow: 1px 2px 4px rgba(0,0,0,0.12);
  letter-spacing: -0.02em;
}

.card-front::after {
  content: '';
  position: absolute;
  bottom: 8px; right: 8px;
  width: 5px; height: 5px;
  border-right: 1px solid rgba(201,168,108,0.4);
  border-bottom: 1px solid rgba(201,168,108,0.4);
}

.card-back {
  background: var(--card-back);
  background-image: radial-gradient(ellipse at 50% 0%, rgba(30,80,160,0.2) 0%, transparent 70%);
  border: 1px solid rgba(201,168,108,0.2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(100,140,200,0.1);
  transform: rotateY(180deg);
}

.reading {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(0.7rem, 2.2vw, 0.95rem);
  color: var(--back-reading);
  font-weight: 400;
  letter-spacing: 0.08em;
  text-align: center;
  line-height: 1.4;
}

.meaning-text {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.5rem, 1.5vw, 0.65rem);
  color: var(--back-meaning);
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 1.4;
  opacity: 0.85;
  text-transform: uppercase;
  padding: 0 4px;
}

.sep {
  width: 20px; height: 1px;
  background: rgba(201,168,108,0.25);
  margin: 0.15rem 0;
}

/* ── Controls ────────────────────────────────────── */
.controls {
  margin-top: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Hint ────────────────────────────────────────── */
.hint {
  margin-top: 1.2rem;
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  text-transform: uppercase;
  text-align: center;
}

/* ── Fade transition ─────────────────────────────── */
.grid.fading  { opacity: 0; transition: opacity 0.15s; }
.grid.visible { opacity: 1; transition: opacity 0.25s; }
</style>
</head>
<body>

<!-- ═══════════ Index view ══════════════════════════ -->
<div id="view-index" class="view">

  <a class="back-link" href="../index.html">← Home</a>

  <header>
    <div class="logo-rule">
      <div class="rule-line"></div>
      <div class="logo-diamond"></div>
      <div class="rule-line right"></div>
    </div>
    <div class="title-ja">漢字フリップ</div>
    <div class="title-en">Kanji Flip · Select a Group</div>
  </header>

  <div class="group-tiles" id="group-tiles"></div>

</div>

<!-- ═══════════ Group view ══════════════════════════ -->
<div id="view-group" class="view" style="display:none">

  <a class="back-link" id="back-to-groups" href="#">← Groups</a>

  <div class="group-label" id="groupLabel">—</div>
  <div class="grid visible" id="grid"></div>

  <div class="controls">
    <button class="btn" id="btn-random"><span>Next Random →</span></button>
  </div>

  <div class="hint">tap a card to reveal · tap again to hide</div>

</div>

<script>
let currentGroup = 0;
let flippedIndex = null;

function showIndex() {
  document.getElementById('view-index').style.display = 'contents';
  document.getElementById('view-group').style.display = 'none';
}

function showGroup(groupIndex) {
  currentGroup = groupIndex;
  document.getElementById('view-index').style.display = 'none';
  document.getElementById('view-group').style.display = 'contents';
  render();
}

function render() {
  const group = KANJI_GROUPS[currentGroup];
  document.getElementById('groupLabel').textContent = group.name;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  flippedIndex = null;

  group.kanji.slice(0, 9).forEach((item, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.id = `cw-${i}`;
    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="kanji-text">${item.kanji}</div>
        </div>
        <div class="card-face card-back">
          <div class="reading">${item.furigana}</div>
          <div class="sep"></div>
          <div class="meaning-text">${item.meaning}</div>
        </div>
      </div>`;
    wrap.addEventListener('click', () => flipCard(i));
    grid.appendChild(wrap);
  });
}

function flipCard(index) {
  if (flippedIndex !== null && flippedIndex !== index) {
    document.getElementById(`cw-${flippedIndex}`).classList.remove('flipped');
  }
  const wrap = document.getElementById(`cw-${index}`);
  flippedIndex = wrap.classList.toggle('flipped') ? index : null;
}

function nextRandom() {
  let next;
  do { next = Math.floor(Math.random() * KANJI_GROUPS.length); }
  while (next === currentGroup && KANJI_GROUPS.length > 1);

  const grid = document.getElementById('grid');
  grid.classList.remove('visible');
  grid.classList.add('fading');
  setTimeout(() => {
    currentGroup = next;
    render();
    grid.classList.remove('fading');
    grid.classList.add('visible');
  }, 150);
}

function buildGroupIndex() {
  const container = document.getElementById('group-tiles');
  KANJI_GROUPS.forEach((group, i) => {
    const tile = document.createElement('div');
    tile.className = 'group-tile';
    tile.innerHTML = `
      <div class="tile-kanji">${group.kanji[0].kanji}</div>
      <div class="tile-name">${group.name}</div>`;
    tile.addEventListener('click', () => showGroup(i));
    container.appendChild(tile);
  });
}

document.getElementById('back-to-groups').addEventListener('click', e => {
  e.preventDefault();
  showIndex();
});
document.getElementById('btn-random').addEventListener('click', nextRandom);

buildGroupIndex();
</script>
</body>
</html>
