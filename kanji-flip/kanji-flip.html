<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字フリップ · Kanji Flip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<script src="kanji-data.js"></script>
<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

:root {
  --bg:           #0c0c0f;
  --surface:      #13131a;
  --card-front:   #f4ede0;
  --card-back:    #12203a;
  --kanji-ink:    #1c1410;
  --gold:         #c9a86c;
  --gold-dim:     #7a6340;
  --back-reading: #c9a86c;
  --back-meaning: #9fb8d8;
  --border-soft:  rgba(201,168,108,0.15);
  --text-muted:   #3a3a4a;
  --text-dim:     #555568;
}

html, body {
  height: 100%;
}

body {
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,108,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(18,32,58,0.4) 0%, transparent 70%);
  font-family: 'Noto Sans JP', sans-serif;
  color: #ccc;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2.5rem 1.5rem 3rem;
  user-select: none;
}

/* ── Header ─────────────────────────────────────── */
header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.logo-rule {
  display: flex;
  align-items: center;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 0.5rem;
}

.rule-line {
  width: 60px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-dim));
}
.rule-line.right {
  background: linear-gradient(to left, transparent, var(--gold-dim));
}

.logo-diamond {
  width: 6px; height: 6px;
  background: var(--gold);
  transform: rotate(45deg);
  opacity: 0.7;
}

.title-ja {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(2rem, 6vw, 3rem);
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 0.2em;
  line-height: 1;
}

.title-en {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  color: var(--text-dim);
  letter-spacing: 0.6em;
  text-transform: uppercase;
  margin-top: 0.5rem;
}

/* ── Group label ─────────────────────────────────── */
.group-label {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  color: var(--gold-dim);
  letter-spacing: 0.25em;
  margin-bottom: 1.5rem;
  min-height: 1.2em;
  text-align: center;
  transition: opacity 0.3s;
}

/* ── Card grid ───────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.85rem;
  width: 100%;
  max-width: 540px;
}

/* ── Card ────────────────────────────────────────── */
.card-wrap {
  perspective: 900px;
  cursor: pointer;
}

.card-inner {
  position: relative;
  width: 100%;
  padding-top: 130%; /* aspect ratio ~4:3 portrait */
  transform-style: preserve-3d;
  transition: transform 0.52s cubic-bezier(0.23, 1, 0.32, 1);
}

.card-wrap.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 6px;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.3rem;
  padding: 0.75rem 0.5rem;
  transition: box-shadow 0.2s;
}

/* Front — washi paper */
.card-front {
  background: var(--card-front);
  background-image:
    radial-gradient(ellipse at 30% 30%, rgba(255,255,240,0.5) 0%, transparent 60%);
  border: 1px solid rgba(201,168,108,0.25);
  box-shadow:
    0 2px 8px rgba(0,0,0,0.45),
    0 8px 24px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.6);
}

.card-wrap:hover .card-front {
  box-shadow:
    0 4px 16px rgba(201,168,108,0.15),
    0 12px 32px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.7);
}

.kanji-text {
  font-family: 'Noto Serif JP', serif;
  font-weight: 900;
  font-size: clamp(1.8rem, 5.5vw, 2.8rem);
  color: var(--kanji-ink);
  line-height: 1;
  text-shadow: 1px 2px 4px rgba(0,0,0,0.12);
  letter-spacing: -0.02em;
}

/* Front corner mark */
.card-front::after {
  content: '';
  position: absolute;
  bottom: 8px; right: 8px;
  width: 5px; height: 5px;
  border-right: 1px solid rgba(201,168,108,0.4);
  border-bottom: 1px solid rgba(201,168,108,0.4);
}

/* Back — deep ink */
.card-back {
  background: var(--card-back);
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(30,80,160,0.2) 0%, transparent 70%);
  border: 1px solid rgba(201,168,108,0.2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(100,140,200,0.1);
  transform: rotateY(180deg);
}

.reading {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(0.7rem, 2.2vw, 0.95rem);
  color: var(--back-reading);
  font-weight: 400;
  letter-spacing: 0.08em;
  text-align: center;
  line-height: 1.4;
}

.meaning-text {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.5rem, 1.5vw, 0.65rem);
  color: var(--back-meaning);
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 1.4;
  opacity: 0.85;
  text-transform: uppercase;
  padding: 0 4px;
}

.sep {
  width: 20px;
  height: 1px;
  background: rgba(201,168,108,0.25);
  margin: 0.15rem 0;
}

/* ── Controls ────────────────────────────────────── */
.controls {
  margin-top: 2rem;
  display: flex;
  align-items: center;
  gap: 1.2rem;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  padding: 0.75rem 1.6rem;
  border: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--gold);
  cursor: pointer;
  transition: background 0.18s, color 0.18s, border-color 0.18s;
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.18s cubic-bezier(0.23, 1, 0.32, 1);
  z-index: 0;
}

.btn:hover::before { transform: scaleX(1); }
.btn:hover { color: #0c0c0f; border-color: var(--gold); }
.btn span { position: relative; z-index: 1; }

.counter {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 0.25em;
  min-width: 50px;
  text-align: center;
}

/* ── Hint ────────────────────────────────────────── */
.hint {
  margin-top: 1.2rem;
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  text-transform: uppercase;
  text-align: center;
}

/* ── Fade transition for group change ────────────── */
.grid.fading { opacity: 0; transition: opacity 0.15s; }
.grid.visible { opacity: 1; transition: opacity 0.25s; }

</style>
</head>
<body>

<header>
  <div class="logo-rule">
    <div class="rule-line"></div>
    <div class="logo-diamond"></div>
    <div class="rule-line right"></div>
  </div>
  <div class="title-ja">漢字フリップ</div>
  <div class="title-en">Kanji Flip · Study Deck</div>
</header>

<div class="group-label" id="groupLabel">—</div>

<div class="grid visible" id="grid"></div>

<div class="controls">
  <button class="btn" onclick="changeGroup(-1)"><span>← Prev</span></button>
  <span class="counter" id="counter">1 / 1</span>
  <button class="btn" onclick="changeGroup(+1)"><span>Next →</span></button>
</div>

<div class="hint">tap a card to reveal · tap again to hide</div>

<script>
let currentGroup = 0;
let flippedIndex = null;

function render() {
  const group = KANJI_GROUPS[currentGroup];
  document.getElementById('groupLabel').textContent = group.name;
  document.getElementById('counter').textContent =
    `${currentGroup + 1} \u2007/\u2007 ${KANJI_GROUPS.length}`;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  flippedIndex = null;

  const items = group.kanji.slice(0, 9);

  items.forEach((item, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.id = `cw-${i}`;

    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="kanji-text">${item.kanji}</div>
        </div>
        <div class="card-face card-back">
          <div class="reading">${item.furigana}</div>
          <div class="sep"></div>
          <div class="meaning-text">${item.meaning}</div>
        </div>
      </div>`;

    wrap.addEventListener('click', () => flipCard(i));
    grid.appendChild(wrap);
  });
}

function flipCard(index) {
  if (flippedIndex !== null && flippedIndex !== index) {
    document.getElementById(`cw-${flippedIndex}`).classList.remove('flipped');
  }
  const wrap = document.getElementById(`cw-${index}`);
  const isFlipped = wrap.classList.toggle('flipped');
  flippedIndex = isFlipped ? index : null;
}

function changeGroup(direction) {
  const grid = document.getElementById('grid');
  grid.classList.remove('visible');
  grid.classList.add('fading');

  setTimeout(() => {
    currentGroup = (currentGroup + direction + KANJI_GROUPS.length) % KANJI_GROUPS.length;
    render();
    grid.classList.remove('fading');
    grid.classList.add('visible');
  }, 150);
}

render();
</script>
</body>
</html>
